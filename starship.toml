"$schema" = 'https://starship.rs/config-schema.json'

# --- 布局定义 ---
# 逻辑：OS/用户(深蓝) -> 路径(天蓝) -> Git(宝石蓝) -> 环境(青蓝) -> 时间(淡紫)
# format = """
# [](blue)\
# $os\
# $username\
# [](bg:sky fg:blue)\
# $directory\
# [](bg:sapphire fg:sky)\
# $git_branch\
# $git_status\
# [](fg:sapphire bg:teal)\
# $c\
# $rust\
# $golang\
# $nodejs\
# $python\
# [](fg:teal bg:lavender)\
# $time\
# [ ](fg:lavender)\
# $cmd_duration\
# $line_break\
# $character"""
format = """
[](blue)\
$os\
$username\
[](bg:sky fg:blue)\
$directory\
[](bg:sapphire fg:sky)\
$git_branch\
$git_status\
[](fg:sapphire bg:lavender)\
$time\
[ ](fg:lavender)\
$cmd_duration\
$line_break\
$character"""

palette = 'catppuccin_mocha'

# --- 模块配置 ---

[os]
disabled = false
style = "bg:blue fg:crust"

[os.symbols]
Arch = "󰣇"
Linux = "󰌽"
Macos = "󰀵"
Windows = ""

[username]
show_always = true
style_user = "bg:blue fg:crust"
style_root = "bg:blue fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:sky fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:sapphire"
format = '[[ $symbol $branch ](fg:crust bg:sapphire)]($style)'

[git_status]
style = "bg:sapphire"
format = '[[($all_status$ahead_behind )](fg:crust bg:sapphire)]($style)'

[nodejs]
symbol = ""
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:crust bg:teal)]($style)'

[rust]
symbol = ""
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:crust bg:teal)]($style)'

[golang]
symbol = ""
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:crust bg:teal)]($style)'

[python]
symbol = ""
style = "bg:teal"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:teal)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:lavender"
format = '[[  $time ](fg:crust bg:lavender)]($style)'

[cmd_duration]
min_time = 500
style = "fg:maroon"
format = "󱎫 $duration "

[character]
disabled = false
success_symbol = '[❯](bold fg:sky)'
error_symbol = '[❯](bold fg:red)'
vimcmd_symbol = '[❮](bold fg:green)'

[line_break]
disabled = false 

# --- Catppuccin Mocha 调色盘定义 ---
