"$schema" = 'https://starship.rs/config-schema.json'

# --- тИЃт▒ђт«џС╣Ѕ ---
# жђ╗УЙЉ№╝џOS/ућеТѕи(Ти▒УЊЮ) -> Уи»тЙё(тцЕУЊЮ) -> Git(т«ЮуЪ│УЊЮ) -> уј»тбЃ(жЮњУЊЮ) -> ТЌХжЌ┤(ТиАу┤Ф)
format = """
[ЬѓХ](blue)\
$os\
$username\
[Ьѓ░](bg:sky fg:blue)\
$directory\
[Ьѓ░](bg:sapphire fg:sky)\
$git_branch\
$git_status\
[Ьѓ░](fg:sapphire bg:teal)\
$c\
$cmake\
$rust\
$cpp\
$nodejs\
$java\
$python\
$direnv\
[Ьѓ░](fg:teal bg:lavender)\
$time\
[Ьѓ┤ ](fg:lavender)\
$cmd_duration\
$line_break\
$character"""
# format = """
# [ЬѓХ](blue)\
# $os\
# $username\
# [Ьѓ░](bg:sky fg:blue)\
# $directory\
# [Ьѓ░](bg:sapphire fg:sky)\
# $git_branch\
# $git_status\
# [Ьѓ░](fg:sapphire bg:lavender)\
# $time\
# [Ьѓ┤ ](fg:lavender)\
# $cmd_duration\
# $line_break\
# $character"""

palette = 'catppuccin_mocha'

# --- ТеАтЮЌжЁЇуй« ---

[os]
disabled = false
style = "bg:blue fg:crust"

[os.symbols]
Arch = "з░БЄ"
Linux = "з░їй"
Macos = "з░ђх"
Windows = "ЬюЈ"

[username]
show_always = true
style_user = "bg:blue fg:crust"
style_root = "bg:blue fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:sky fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "Рђд/"

[directory.substitutions]
"Documents" = "з░ѕЎ "
"Downloads" = "№ђЎ "
"Music" = "з░Юџ "
"Pictures" = "№ђЙ "
"Developer" = "з░▓І "

[git_branch]
symbol = "№љў"
style = "bg:sapphire"
format = '[[ $symbol $branch ](fg:crust bg:sapphire)]($style)'

[git_status]
style = "bg:sapphire"
format = '[[($all_status$ahead_behind )](fg:crust bg:sapphire)]($style)'

[nodejs]
symbol = "Ьюў"
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:crust bg:teal)]($style)'

[rust]
symbol = "Ьъе"
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:crust bg:teal)]($style)'

[c]
symbol = "з░ђў"
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:crust bg:teal)]($style)'

[cmake]
symbol = "з░▓ї"
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:crust bg:teal)]($style)'

[cpp]
symbol = "з░Ў▓"
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:crust bg:teal)]($style)'

[java]
symbol = "ЬЅќ"
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:crust bg:teal)]($style)'

[python]
symbol = "Ьўє"
style = "bg:teal"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:teal)]($style)'

[direnv]
symbol = "№ЂЙ"
style = "bg:teal"
format = '[[ $symbol( $name) ](fg:crust bg:teal)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:lavender"
format = '[[ №љ║ $time ](fg:crust bg:lavender)]($style)'

[cmd_duration]
min_time = 500
style = "fg:maroon"
format = "з▒јФ $duration "

[character]
disabled = false
success_symbol = '[РЮ»](bold fg:sky)'
error_symbol = '[РЮ»](bold fg:red)'
vimcmd_symbol = '[РЮ«](bold fg:green)'

[line_break]
disabled = false 

# --- Catppuccin Mocha У░ЃУЅ▓уЏўт«џС╣Ѕ ---
